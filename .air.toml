root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -buildvcs=false -o ./tmp/ebi-mawaru ."
bin = "./tmp/ebi-mawaru"
delay = 1000
exclude_dir = ["tmp", ".git", ".vscode"]
exclude_regex = ["_test.go"]
include_ext = ["go", "toml"]
kill_delay = "500ms"
stop_on_error = true

[log]
time = true

[misc]
clean_on_exit = true
